# Decompilation progress dashboard.
#
# On every merge to main this rebuilds the units, measures match progress with
# objdiff, appends one timestamped record to the running history, and republishes
# the static dashboard to an orphan `gh-pages` branch (served via GitHub Pages).
#
# The history (data/history.json) is append-only and lives entirely on gh-pages,
# so main's tree never carries generated data. See docs/DASHBOARD.md for the
# one-time setup (enabling Pages and wiring up the `fl` toolchain driver).
name: Decomp Progress Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

# Needed to force-push the generated site to gh-pages.
permissions:
  contents: write

# Never let two dashboard runs race on the gh-pages branch.
concurrency:
  group: decomp-dashboard
  cancel-in-progress: false

jobs:
  measure-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # committer dates / subjects for the snapshot

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Wine (MSVC 6.0 runs under Wine on Linux)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wine wine32

      # `fl` (github.com/alecnunn/flboot) is the toolchain driver
      # (bootstrap/build/progress). Grab the latest prebuilt Linux binary — much
      # faster than a source build. To build from source instead, swap in:
      #   cargo install --locked --git https://github.com/alecnunn/flboot fl
      # (ubuntu-latest already provides cargo; Wine is installed above.)
      - name: Install fl (latest flboot release)
        run: |
          set -euo pipefail
          url=$(curl -fsSL -H "Authorization: Bearer ${{ github.token }}" \
                  https://api.github.com/repos/alecnunn/flboot/releases/latest \
                | grep -oE '"browser_download_url": *"[^"]*linux-gnu\.tar\.gz"' \
                | grep -oE 'https[^"]*')
          test -n "$url"
          echo "Installing fl from $url"
          curl -fsSL "$url" | sudo tar -xz -C /usr/local/bin fl
          sudo chmod +x /usr/local/bin/fl
          fl --version

      - name: Bootstrap toolchain, originals, and delink targets
        run: fl bootstrap

      # fl generates build.ninja but drops per-unit flags like /GX and /G6;
      # re-apply them from config.json so the build matches the real toolchain.
      - name: Re-apply per-unit compiler flags
        run: python scripts/apply_unit_cflags.py

      - name: Build every unit that has source
        run: |
          UNITS=$(python - <<'PY'
          import json
          u = json.load(open("objdiff.json"))["units"]
          print(" ".join(x["name"].split("/")[-1] for x in u))
          PY
          )
          # Empty stub units compile instantly; the units with source do the work.
          fl build $UNITS || true

      - name: Generate objdiff progress report
        run: |
          # fl bootstrap fetches objdiff-cli into build/tools (not onto PATH).
          objdiff=$(find build/tools -name 'objdiff-cli-*' -type f | head -1)
          test -x "$objdiff" || { echo "::error::objdiff-cli not found under build/tools"; exit 1; }
          "$objdiff" report generate -o report.json

      - name: Snapshot this merge
        run: python scripts/decomp_dashboard.py snapshot --report report.json --out snapshot.json

      - name: Publish dashboard to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p pages/data
          # Pull the existing append-only history from gh-pages, if the branch exists.
          if git fetch --depth=1 origin gh-pages 2>/dev/null; then
            git show FETCH_HEAD:data/history.json > pages/data/history.json 2>/dev/null || true
          fi
          # Append this merge's record and (re)materialise the static site.
          python scripts/decomp_dashboard.py publish --snapshot snapshot.json --pages pages
          # Force-push a fresh single-commit orphan branch carrying the full history.
          cd pages
          git init -q
          git checkout -q --orphan gh-pages
          git add -A
          git -c user.name="decomp-dashboard[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -q -m "progress: ${GITHUB_SHA::7} @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
